name: Android Release

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish, for example v1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing repository secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/labcards-key.jks"
          chmod 600 "$RUNNER_TEMP/labcards-key.jks"

      - name: Build signed release APK
        env:
          LABCARDS_RELEASE_STORE_FILE: ${{ runner.temp }}/labcards-key.jks
          LABCARDS_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          LABCARDS_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          LABCARDS_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$LABCARDS_RELEASE_STORE_PASSWORD" ]; then
            echo "::error::Missing repository secret: ANDROID_KEYSTORE_PASSWORD"
            exit 1
          fi
          if [ -z "$LABCARDS_RELEASE_KEY_ALIAS" ]; then
            echo "::error::Missing repository secret: ANDROID_KEY_ALIAS"
            exit 1
          fi
          if [ -z "$LABCARDS_RELEASE_KEY_PASSWORD" ]; then
            echo "::error::Missing repository secret: ANDROID_KEY_PASSWORD"
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew test assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabCards-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: LabCards ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
